<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A message for Tamanna</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="card">
    <h1>A message for Tamanna</h1>
    <p class="subtitle">Leave your name, number and a little note. One message per person.</p>

    <form id="messageForm" novalidate>
      <label>
        <span>Your name</span>
        <input type="text" id="name" name="name" required maxlength="60" autocomplete="name" />
      </label>

      <label>
        <span>Phone number</span>
        <input type="tel" id="phone" name="phone" required maxlength="20" autocomplete="tel" inputmode="tel" placeholder="e.g. 9876543210" />
      </label>

      <label>
        <span>Your message</span>
        <textarea id="message" name="message" required maxlength="500" rows="5"></textarea>
      </label>

      <button type="submit" id="submitBtn">Send message</button>
      <p id="status" class="status" role="status" aria-live="polite"></p>
    </form>
  </main>

  <script src="script.js"></script>
</body>
</html>
